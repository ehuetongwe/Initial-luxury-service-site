<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Aura Luxury Transport</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-container {
            padding: var(--spacing-xl) 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background-color: var(--color-bg-secondary);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            color: var(--color-accent-gold);
            font-weight: bold;
        }

        .stat-label {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .recent-customers {
            background-color: var(--color-bg-secondary);
            padding: var(--spacing-lg);
            border: 1px solid var(--color-border);
        }

        .customer-item {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
        }

        .customer-item:last-child {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .status-pending {
            background-color: #ffd166;
            color: #000;
        }

        .status-confirmed {
            background-color: #06d6a0;
            color: #000;
        }

        .status-completed {
            background-color: #118ab2;
            color: #fff;
        }

        .status-cancelled {
            background-color: #ef476f;
            color: #fff;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">AURA</a>
                <ul class="nav-links">
                    <li><a href="admin.html">Dashboard</a></li>
                    <li><a href="#customers">Customers</a></li>
                    <li><a href="index.html">View Site</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container admin-container">
            <h1>Admin Dashboard</h1>

            <div class="stats-grid" id="customers">
                <div class="stat-card">
                    <div class="stat-number" id="total-customers">0</div>
                    <div class="stat-label">Total Customers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="new-today">0</div>
                    <div class="stat-label">New Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-customers">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="inactive-customers">0</div>
                    <div class="stat-label">Inactive</div>
                </div>
            </div>

            <h2>Recent Customers</h2>
            <div class="recent-customers" id="recent-customers">
                <p>Loading recent customers...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container" style="text-align: center; color: var(--color-text-secondary);">
            <p>&copy; 2026 Aura Luxury Transport. Admin Dashboard</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        // Initialize Supabase with admin credentials (use a service role key for admin)
        // Note: In a real production app, admin pages should be protected and keys not exposed client-side like this.
        // For this demo, we assume the user puts the key in config.js (or separate admin config).
        const supabase = window.supabase.createClient(
            CONFIG.SUPABASE_URL,
            CONFIG.SUPABASE_ANON_KEY // Admin might need service role, but for now using standard. 
            // If specific admin features need service role, it should be in config or prompts.
            // The original code had placeholders. I'll use CONFIG.
        );

        async function loadDashboardData() {
            try {
                // Get today's date for filtering
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // Load all customers
                const { data: customers } = await supabase
                    .from('customers')
                    .select('*');

                // Load customers created today
                const { data: newToday } = await supabase
                    .from('customers')
                    .select('*')
                    .gte('created_at', today.toISOString());

                // Load active customers
                const { data: activeCustomers } = await supabase
                    .from('customers')
                    .select('*')
                    .eq('status', 'active');

                // Load inactive customers
                const { data: inactiveCustomers } = await supabase
                    .from('customers')
                    .select('*')
                    .eq('status', 'inactive');

                // Update stats
                document.getElementById('total-customers').textContent = customers?.length || 0;
                document.getElementById('new-today').textContent = newToday?.length || 0;
                document.getElementById('active-customers').textContent = activeCustomers?.length || 0;
                document.getElementById('inactive-customers').textContent = inactiveCustomers?.length || 0;

                // Load recent customers
                const { data: recentCustomers } = await supabase
                    .from('customers')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);

                // Display recent customers
                const recentContainer = document.getElementById('recent-customers');
                if (recentCustomers && recentCustomers.length > 0) {
                    recentContainer.innerHTML = recentCustomers.map(customer => `
                        <div class="customer-item">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <strong>${customer.first_name} ${customer.last_name}</strong><br>
                                    ${customer.email} | ${customer.phone_number || 'No phone'}
                                </div>
                                <span class="status-badge status-${customer.status === 'active' ? 'confirmed' : customer.status === 'inactive' ? 'pending' : 'cancelled'}">${customer.status}</span>
                            </div>
                            <div style="margin-top: 8px; color: var(--color-text-secondary);">
                                ${customer.city ? customer.city + ', ' : ''}${customer.state || ''} ${customer.country || ''}<br>
                                Added: ${new Date(customer.created_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    recentContainer.innerHTML = '<p>No customers found.</p>';
                }

            } catch (error) {
                console.error('Error loading dashboard data:', error);
                document.getElementById('recent-customers').innerHTML =
                    '<p>Error loading data. Please check your connection.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>

</html>
